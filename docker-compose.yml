---
services:
  tailscale:
    image: tailscale/tailscale:latest@sha256:${TS_IMAGE_SHA}
    container_name: ts-oauth-test
    hostname: oauth-test
    environment:
      - TS_CLIENT_SECRET=${TS_CLIENT_SECRET}
      - TS_CLIENT_ID=${TS_CLIENT_ID}
      - TS_EXTRA_ARGS=--advertise-tags=tag:dev-container
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ${PWD}/.ts/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped
  devcontainer:
    build:
      dockerfile: Dockerfile

    network_mode: service:tailscale
